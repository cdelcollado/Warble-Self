services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-warble}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warble_secret}
      POSTGRES_DB: ${POSTGRES_DB:-warble}
    # No host port — internal only. Connect via: docker compose exec postgres psql -U warble
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warble}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-warble_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-warble_minio_secret}
    # No host port mappings — MinIO is internal only.
    # Access the admin console via: docker compose exec minio mc admin info local
    # Or temporarily expose with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-warble}:${POSTGRES_PASSWORD:-warble_secret}@postgres:5432/${POSTGRES_DB:-warble}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-warble_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-warble_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-codefiles}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ADMIN_SECRET: ${ADMIN_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    # No host port — Caddy proxies to this container internally
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
