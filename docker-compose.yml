services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: warble
      POSTGRES_PASSWORD: warble_secret
      POSTGRES_DB: warble
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warble"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: warble_minio
      MINIO_ROOT_PASSWORD: warble_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://warble:warble_secret@postgres:5432/warble
      BETTER_AUTH_SECRET: change_this_in_production
      BETTER_AUTH_URL: http://localhost:3000
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: warble_minio
      MINIO_SECRET_KEY: warble_minio_secret
      MINIO_BUCKET: codefiles
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
